apiVersion: v1
kind: Namespace
metadata:
  name: ai-devops
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-devops-sa
  namespace: ai-devops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ai-devops
  name: ai-devops-role
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-devops-rolebinding
  namespace: ai-devops
subjects:
- kind: ServiceAccount
  name: ai-devops-sa
  namespace: ai-devops
roleRef:
  kind: Role
  name: ai-devops-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-app
  namespace: ai-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-app
  template:
    metadata:
      labels:
        app: ai-devops-app
    spec:
      serviceAccountName: ai-devops-sa
      containers:
      - name: ai-devops-container
        image: ai-devops-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-devops-service
  namespace: ai-devops
spec:
  type: NodePort
  selector:
    app: ai-devops-app
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    # nodePort removed → auto-assign
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ai-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: ai-devops
spec:
  selector:
    app: prometheus
  ports:
  - protocol: TCP
    port: 9090
    targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ai-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: ai-devops
spec:
  selector:
    app: grafana
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    