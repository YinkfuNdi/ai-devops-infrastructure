apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-devops-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-devops-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-devops-rolebinding
subjects:
  - kind: ServiceAccount
    name: ai-devops-sa
roleRef:
  kind: Role
  name: ai-devops-role
  apiGroup: rbac.authorization.k8s.io